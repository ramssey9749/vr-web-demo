    var gravity_bounds = 0.06;

    // 1. SHARP TEXTURE COMPONENT (The "Anti-Blur")
    AFRAME.registerComponent('force-sharp', {
      init: function () {
        this.el.addEventListener('materialtextureloaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !mesh.material || !mesh.material.map) return;
          const tex = mesh.material.map;
          tex.magFilter = THREE.NearestFilter;
          tex.minFilter = THREE.NearestFilter;
          tex.generateMipmaps = false; 
          tex.anisotropy = 16;
          tex.needsUpdate = true;
        });
      }
    });





    // 2. PHYSICS
    AFRAME.registerComponent('manual-physics', {
      init: function() {
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.isGrabbed = false;
      },
      tick: function(time, timeDelta) {
        if (this.isGrabbed) return; 
        let pos = this.el.getAttribute('position');
        if (pos.y > gravity_bounds || this.velocity.y > 0) {
          this.velocity.y -= 0.000015 * timeDelta;
          this.velocity.x *= 0.98;
          this.velocity.z *= 0.98;
          pos.x += this.velocity.x * timeDelta;
          pos.y += this.velocity.y * timeDelta;
          pos.z += this.velocity.z * timeDelta;
          this.el.setAttribute('position', pos);
        } else {
          pos.y = gravity_bounds;
          this.velocity.set(0, 0, 0);
          this.el.setAttribute('position', pos);
        }
      }
    });

    // 3. MOVEMENT
    AFRAME.registerComponent('vr-move', {
      init: function() {
        this.moveSpeed = document.getElementById("run").value; 
        this.rig = document.querySelector('#rig');
        this.cam = document.querySelector('a-camera');
        this.canTurn = true;
        this.joystickData = { x: 0, y: 0 };
        this.el.addEventListener('thumbstickmoved', (e) => {
          if (this.el.id === 'lhand') {
            this.joystickData.x = e.detail.x;
            this.joystickData.y = e.detail.y;
          }
          if (this.el.id === 'rhand') {
            let x = e.detail.x;
            if (Math.abs(x) > 0.5 && this.canTurn) {
              let rigRot = this.rig.getAttribute('rotation');
              rigRot.y += (x > 0) ? -45 : 45;
              this.rig.setAttribute('rotation', rigRot);
              this.canTurn = false;
              setTimeout(() => { this.canTurn = true; }, 300);
            }
          }
        });
      },
      tick: function(time, timeDelta) {

        this.moveSpeed = parseFloat(document.getElementById("run").value); 

        if (this.el.id === 'lhand') {
          let x = this.joystickData.x;
          let y = this.joystickData.y;
          if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
            let rigRot = this.rig.getAttribute('rotation').y;
            let camRot = this.cam.getAttribute('rotation').y;
            let totalAngle = (rigRot + camRot) * (Math.PI / 180);
            let forward = new THREE.Vector3(-Math.sin(totalAngle), 0, -Math.cos(totalAngle));
            let right = new THREE.Vector3(Math.cos(totalAngle), 0, -Math.sin(totalAngle));
            let velocityFactor = this.moveSpeed * timeDelta;
            let moveVec = forward.multiplyScalar(-y * velocityFactor).add(right.multiplyScalar(x * velocityFactor));
            let rigPos = this.rig.getAttribute('position');
            rigPos.x += moveVec.x;
            rigPos.z += moveVec.z;
            rigPos.y = player_y;
            this.rig.setAttribute('position', rigPos);
          }
        }
      }
    });



    // 4. MENU CONTROLLER
    AFRAME.registerComponent('menu-controller', {
      init: function() {
        this.menuVisible = false;
        this.menu2Visible = false;
        this.menuEntity = document.querySelector('#ui-menu');
        this.menu2Entity = document.querySelector('#ui-menu2');
        this.confirmWindow = document.querySelector('#confirm-window');
        this.current_sky_Mode = 'sky-on';
        this.currentMode = 'add';
        this.currentShape = 'box';

        window.addEventListener('bbuttondown', () => {
          this.menuVisible = !this.menuVisible;
          this.menuEntity.setAttribute('visible', this.menuVisible);
          this.toggleConfirm(false); 
        });

        window.addEventListener('ybuttondown', () => {
          this.menu2Visible = !this.menu2Visible;
          this.menu2Entity.setAttribute('visible', this.menu2Visible);
          this.toggleConfirm(false); 
        });

      },
      toggleConfirm: function(show) {
        this.confirmWindow.setAttribute('visible', show);
        const confirmBtns = this.confirmWindow.querySelectorAll('.conf-btn');
        confirmBtns.forEach(btn => {
          if (show) btn.classList.add('menu-btn');
          else btn.classList.remove('menu-btn');
        });
      },
      handleAction: function(action) {
        //objj_index = 0;
        if (action === 'sky-on') {document.querySelector('a-sky').setAttribute('visible', true);}
        if (action === 'sky-off') {document.querySelector('a-sky').setAttribute('visible', false);}

        
        if (action === 'run-on') {document.getElementById("run").value = "0.5";} // High speed}
        if (action === 'run-off') {document.getElementById("run").value = "0.005";} // Normal speed}

        if (action === 'mode-add') this.currentMode = 'add';
        if (action === 'mode-del') this.currentMode = 'delete';
        if (action === 'shape-box') this.currentShape = 'box';
        if (action === 'shape-sphere') this.currentShape = 'sphere';
        //if (action === 'shape-c-coin') this.currentShape = 'c-coin';
        //if (action === 'shape-s-coin') this.currentShape = 's-coin';
        //if (action === 'shape-g-coin') this.currentShape = 'g-coin';
        if (action === 'clear-req') this.toggleConfirm(true);
        if (action === 'clear-no') this.toggleConfirm(false);
        if (action === 'clear-yes') {
          document.querySelectorAll('.spawned').forEach(obj => obj.parentNode.removeChild(obj));
          this.toggleConfirm(false);
        }
      }
    });


    // 5. BUTTON BEHAVIOR
    AFRAME.registerComponent('ui-button', {
      init: function() {
        this.originalColor = this.el.getAttribute('color');
        this.el.addEventListener('mouseenter', () => {
          if (this.el.classList.contains('menu-btn')) this.el.setAttribute('color', '#FFEB3B');
        });
        this.el.addEventListener('mouseleave', () => this.el.setAttribute('color', this.originalColor));
        this.el.addEventListener('click', () => {
          if (!this.el.classList.contains('menu-btn')) return;
          const action = this.el.getAttribute('data-action');
          this.el.sceneEl.components['menu-controller'].handleAction(action);
          this.el.setAttribute('scale', '1.1 1.1 1.1');
          setTimeout(() => this.el.setAttribute('scale', '1 1 1'), 100);
        });
      }
    });



    // 6. HAND INTERACTION (Filtered Raycasting)
    AFRAME.registerComponent('hand-interaction', {
      init: function() {
        this.grabbedEl = null;
        this.prevHandPos = new THREE.Vector3();
        this.currentHandPos = new THREE.Vector3();
        
        this.el.addEventListener('triggerdown', () => {
          const ray = this.el.components.raycaster;
          if (!ray || ray.intersectedEls.length === 0) this.onGrab();
        });

        this.el.addEventListener('triggerup', () => this.onRelease());

        this.el.addEventListener('abuttondown', () => {
          const menu = this.el.sceneEl.components['menu-controller'];

          let handPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(handPos);
          if (menu.currentMode === 'add') {
            let newObj = document.createElement('a-' + menu.currentShape);
            newObj.classList.add('cube', 'spawned');
            if(menu.currentShape === 'box') {
               newObj.setAttribute('width', '0.15'); newObj.setAttribute('height', '0.15'); newObj.setAttribute('depth', '0.15');
            } else { newObj.setAttribute('radius', '0.08'); }
            newObj.setAttribute('color', object_color);
            newObj.setAttribute('position', handPos);
            newObj.setAttribute('manual-physics', '');
            this.el.sceneEl.appendChild(newObj);
          } else if (menu.currentMode === 'delete') {
            document.querySelectorAll('.spawned').forEach(obj => {
              let objPos = new THREE.Vector3();
              obj.object3D.getWorldPosition(objPos);
              if (handPos.distanceTo(objPos) < 0.3) obj.parentNode.removeChild(obj);
            });
          }
        });

        this.el.addEventListener('xbuttondown', () => {
          const menu = this.el.sceneEl.components['menu-controller'];
          let handPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(handPos);
          if (menu.currentMode === 'add') {
            let newObj = document.createElement('a-' + menu.currentShape);
            newObj.classList.add('cube', 'spawned');
            if(menu.currentShape === 'box') {
               newObj.setAttribute('width', '0.15'); newObj.setAttribute('height', '0.15'); newObj.setAttribute('depth', '0.15');
            } else { newObj.setAttribute('radius', '0.08'); }
            newObj.setAttribute('color', object_color);
            newObj.setAttribute('position', handPos);
            newObj.setAttribute('manual-physics', '');
            this.el.sceneEl.appendChild(newObj);
          } else if (menu.currentMode === 'delete') {
            document.querySelectorAll('.spawned').forEach(obj => {
              let objPos = new THREE.Vector3();
              obj.object3D.getWorldPosition(objPos);
              if (handPos.distanceTo(objPos) < 0.3) obj.parentNode.removeChild(obj);
            });
          }
        });

      },
      tick: function() {
        this.prevHandPos.copy(this.currentHandPos);
        this.el.object3D.getWorldPosition(this.currentHandPos);
      },
      onGrab: function() {
        let cubes = document.querySelectorAll('.cube');
        cubes.forEach(cube => {
          let cubePos = new THREE.Vector3();
          cube.object3D.getWorldPosition(cubePos);
          if (this.currentHandPos.distanceTo(cubePos) < 0.25) {
            this.grabbedEl = cube;
            this.grabbedEl.components['manual-physics'].isGrabbed = true;
            this.el.object3D.attach(this.grabbedEl.object3D);
          }
        });
      },
      onRelease: function() {
        if (this.grabbedEl) {
          let throwVec = new THREE.Vector3().subVectors(this.currentHandPos, this.prevHandPos).multiplyScalar(0.8);
          this.el.sceneEl.object3D.attach(this.grabbedEl.object3D);
          this.grabbedEl.components['manual-physics'].isGrabbed = false;
          this.grabbedEl.components['manual-physics'].velocity.copy(throwVec);
          this.grabbedEl = null;
        }
      }
    });

AFRAME.registerComponent('mode-background', {
  init: function () {
    const sky = this.el;
    const sceneEl = this.el.sceneEl;

    //sky.setAttribute('material', {visible: true, color: 'black'});

    // Listen for when the user enters a VR or AR session
    sceneEl.addEventListener('enter-vr', () => {
      // Check if the current session is AR (Passthrough)
      if (sceneEl.is('ar-mode')) {
        //sky.setAttribute('material', 'visible', true); // need to add a button to toggle this on and off
        sky.setAttribute('material', {visible: true, color: 'black'});
      } else {
        // Otherwise, it's VR mode
        sky.setAttribute('material', {visible: true, color: 'black', transparent: false});
      }});
    // Reset when exiting back to the 2D browser
    sceneEl.addEventListener('exit-vr', () => {sky.setAttribute('material', {visible: true, color: 'black'});});
  }});
