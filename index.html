<!DOCTYPE html>
<html>
<head>
  <title>VR - HUD Menu & Pixel-Sharp Floor</title>
  <script src="aframe.min.js"></script>

<input type="text" id="run" value="0.005" style="display: none;">

  <script>

    // lists for the objects
    var object_colors = ['#FFC65D', '#FF0000','#00FF00', '#0000FF','black','white','grey'];
    var object_color = object_colors[0];
    var objj_index = 0;
    
    // Texture definitions
    var object_textures = [
      'blank.png', 
      'box_texture.png', 
      'sphere_texture.png',
      'metal_tex.png'
    ];
    var current_texture = object_textures[0];
    var texture_index = 0;

const shapeConfigs = {
  'box': {
    geometry: { primitive: 'box', width: 0.15, height: 0.15, depth: 0.15 },
    texture: 'box_texture.png'
  },
  'sphere': {
    geometry: { primitive: 'sphere', radius: 0.1 },
    texture: 'sphere_texture.png'
  },
  'cylinder': {
    geometry: { primitive: 'cylinder', radius: 0.05, height: 0.2 },
    texture: 'metal_tex.png'
  },
  'cone': {
    geometry: { primitive: 'cone', radius: 0.05, height: 0.2 },
    texture: 'blank.png'
  },
'test_hand': {
    isModel: true,
    model: '#custom-model', // Matches your <a-asset-item id>
    scale: '0.1 0.1 0.1'
  }
};

    // player start cords
    var player_x = 0;
    var player_y = 0;
    var player_z = 0;
    var player_speeds = ['0.005','0.5'];
    var player_speed = player_speeds[0];

    // world settings
    var gravity_bounds = 0.06;
    var sky_state = "sky_on";


/*
    if (objj_index === 3) {
        objj_index = 0
        
        } else {
        objj_index += 1
        };
*/

    // 1. SHARP TEXTURE COMPONENT (The "Anti-Blur")
    AFRAME.registerComponent('force-sharp', {
      init: function () {
        this.el.addEventListener('materialtextureloaded', () => {
          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !mesh.material || !mesh.material.map) return;
          const tex = mesh.material.map;
          tex.magFilter = THREE.NearestFilter;
          tex.minFilter = THREE.NearestFilter;
          tex.generateMipmaps = false; 
          tex.anisotropy = 16;
          tex.needsUpdate = true;
        });
      }
    });

// alows custom models to have textures
AFRAME.registerComponent('model-texture-fix', {
  schema: { src: {type: 'string'} },
  init: function () {
    this.el.addEventListener('model-loaded', () => {
      const mesh = this.el.getObject3D('mesh');
      const loader = new THREE.TextureLoader();
      
      loader.load(this.data.src, (texture) => {
        // Pixel-sharp settings for your textures
        texture.magFilter = THREE.NearestFilter;
        texture.minFilter = THREE.NearestFilter;
        texture.flipY = false; // Important for GLB models

        mesh.traverse(node => {
          if (node.isMesh) {
            node.material.map = texture;
            node.material.color.set(object_color); // Also applies your color toggle
            node.material.needsUpdate = true;
          }
        });
      });
    });
  }
});

    // 2. PHYSICS
    AFRAME.registerComponent('manual-physics', {
      init: function() {
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.isGrabbed = false;
      },
      tick: function(time, timeDelta) {
        if (this.isGrabbed) return; 
        let pos = this.el.getAttribute('position');
        if (pos.y > gravity_bounds || this.velocity.y > 0) {
          this.velocity.y -= 0.000015 * timeDelta;
          this.velocity.x *= 0.98;
          this.velocity.z *= 0.98;
          pos.x += this.velocity.x * timeDelta;
          pos.y += this.velocity.y * timeDelta;
          pos.z += this.velocity.z * timeDelta;
          this.el.setAttribute('position', pos);
        } else {
          pos.y = gravity_bounds;
          this.velocity.set(0, 0, 0);
          this.el.setAttribute('position', pos);
        }
      }
    });

    // 3. MOVEMENT
    AFRAME.registerComponent('vr-move', {
      init: function() {
        this.moveSpeed = player_speed;
        this.rig = document.querySelector('#rig');
        this.cam = document.querySelector('a-camera');
        this.canTurn = true;
        this.joystickData = { x: 0, y: 0 };
        this.el.addEventListener('thumbstickmoved', (e) => {
          if (this.el.id === 'lhand') {
            this.joystickData.x = e.detail.x;
            this.joystickData.y = e.detail.y;
          }
          if (this.el.id === 'rhand') {
            let x = e.detail.x;
            if (Math.abs(x) > 0.5 && this.canTurn) {
              let rigRot = this.rig.getAttribute('rotation');
              rigRot.y += (x > 0) ? -45 : 45;
              this.rig.setAttribute('rotation', rigRot);
              this.canTurn = false;
              setTimeout(() => { this.canTurn = true; }, 300);
            }
          }
        });
      },
      tick: function(time, timeDelta) {

        this.moveSpeed = parseFloat(document.getElementById("run").value); 

        if (this.el.id === 'lhand') {
          let x = this.joystickData.x;
          let y = this.joystickData.y;
          if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
            let rigRot = this.rig.getAttribute('rotation').y;
            let camRot = this.cam.getAttribute('rotation').y;
            let totalAngle = (rigRot + camRot) * (Math.PI / 180);
            let forward = new THREE.Vector3(-Math.sin(totalAngle), 0, -Math.cos(totalAngle));
            let right = new THREE.Vector3(Math.cos(totalAngle), 0, -Math.sin(totalAngle));
            let velocityFactor = this.moveSpeed * timeDelta;
            let moveVec = forward.multiplyScalar(-y * velocityFactor).add(right.multiplyScalar(x * velocityFactor));
            let rigPos = this.rig.getAttribute('position');
            rigPos.x += moveVec.x;
            rigPos.z += moveVec.z;
            rigPos.y = player_y;
            this.rig.setAttribute('position', rigPos);
          }
        }
      }
    });



    // 4. MENU CONTROLLER
    AFRAME.registerComponent('menu-controller', {
      init: function() {
        this.menuVisible = false;
        this.menu2Visible = false;
        this.menuEntity = document.querySelector('#ui-menu');
        this.confirmWindow = document.querySelector('#confirm-window');
        this.current_sky_Mode = 'sky-on';
        this.currentMode = 'add';
        this.currentShape = 'box';

        // 1. Define your label arrays
        this.modeLabels = ["ADD", "DEL"];
        this.skyLabels = ["SKY OFF", "SKY ON"];
        this.runLabels = ["RUN OFF", "RUN ON"];
        this.colorNames = ["YELLOW", "RED","GREEN","BLUE","BLACK","WHITE","GREY"]; // Match your object_colors array
        
        // Toggle/Cycle States
        this.currentMode = 'add'; 
        this.shapeOptions = ['box', 'sphere', 'cylinder', 'cone','test_hand'];
        this.shapeIndex = 0;
        this.colorIndex = 0; // Uses your existing object_colors array
        this.currentMode = 'add';

        window.addEventListener('bbuttondown', () => {
          this.menuVisible = !this.menuVisible;
          this.menuEntity.setAttribute('visible', this.menuVisible);
          this.toggleConfirm(false); 
        });

        window.addEventListener('ybuttondown', () => {
          this.menu2Visible = !this.menu2Visible;
          this.menu2Entity.setAttribute('visible', this.menu2Visible);
          this.toggleConfirm(false); 
        });

      },
      toggleConfirm: function(show) {
        this.confirmWindow.setAttribute('visible', show);
        const confirmBtns = this.confirmWindow.querySelectorAll('.conf-btn');
        confirmBtns.forEach(btn => {
          if (show) btn.classList.add('menu-btn');
          else btn.classList.remove('menu-btn');
        });
      },
      handleAction: function(action) {
        const sky = document.querySelector('a-sky');
        const runInput = document.getElementById("run");
        this.textureLabels = ["NONE", "SQUARE", "DOTS", "METAL"];


        // TEXTURE CYCLE
        if (action === 'cycle-texture') {
          texture_index = (texture_index + 1) % object_textures.length;
          current_texture = object_textures[texture_index];
          const texText = document.querySelector('[data-action="cycle-texture"] a-text');
          texText.setAttribute('value', this.textureLabels[texture_index]);
        }

        // MODE TOGGLE (ADD/DEL)
        if (action === 'toggle-mode') {
          this.currentMode = (this.currentMode === 'add') ? 'delete' : 'add';
          const labelIndex = (this.currentMode === 'add') ? 0 : 1;
          document.querySelector('#mode-text').setAttribute('value', this.modeLabels[labelIndex]);
        }

        // SKY TOGGLE
        if (action === 'toggle-sky') {
          let isVisible = sky.getAttribute('visible');
          sky.setAttribute('visible', !isVisible);
          // Find the text inside the sky button and update it
          const skyText = document.querySelector('[data-action="toggle-sky"] a-text');
          skyText.setAttribute('value', isVisible ? this.skyLabels[0] : this.skyLabels[1]);
        }

        
        // RUN TOGGLE
        if (action === 'toggle-run') {
          const isFast = runInput.value === "0.5";
          runInput.value = isFast ? "0.005" : "0.5";
          const runText = document.querySelector('[data-action="toggle-run"] a-text');
          runText.setAttribute('value', isFast ? this.runLabels[0] : this.runLabels[1]);
        }

        // SHAPE CYCLE
        if (action === 'cycle-shape') {
          this.shapeIndex = (this.shapeIndex + 1) % this.shapeOptions.length;
          this.currentShape = this.shapeOptions[this.shapeIndex];
          const shapeText = document.querySelector('[data-action="cycle-shape"] a-text');
          shapeText.setAttribute('value', this.currentShape.toUpperCase());
        }

        // COLOR CYCLE
        if (action === 'cycle-color') {
          this.colorIndex = (this.colorIndex + 1) % object_colors.length;
          object_color = object_colors[this.colorIndex];
          const colorText = document.querySelector('[data-action="cycle-color"] a-text');
          colorText.setAttribute('value', this.colorNames[this.colorIndex]);
        }
       
        //if (action === 'shape-c-coin') this.currentShape = 'c-coin';
        //if (action === 'shape-s-coin') this.currentShape = 's-coin';
        //if (action === 'shape-g-coin') this.currentShape = 'g-coin';

        // 6. CLEAR ALL LOGIC
        if (action === 'clear-req') this.toggleConfirm(true);
        if (action === 'clear-no') this.toggleConfirm(false);
        if (action === 'clear-yes') {
          document.querySelectorAll('.spawned').forEach(obj => obj.parentNode.removeChild(obj));
          this.toggleConfirm(false);
        }
      }
    });


    // 5. BUTTON BEHAVIOR
    AFRAME.registerComponent('ui-button', {
      init: function() {
        this.originalColor = this.el.getAttribute('color');
        this.el.addEventListener('mouseenter', () => {
          if (this.el.classList.contains('menu-btn')) this.el.setAttribute('color', '#FFEB3B');
        });
        this.el.addEventListener('mouseleave', () => this.el.setAttribute('color', this.originalColor));
        this.el.addEventListener('click', () => {
          if (!this.el.classList.contains('menu-btn')) return;
          const action = this.el.getAttribute('data-action');
          this.el.sceneEl.components['menu-controller'].handleAction(action);
          this.el.setAttribute('scale', '1.1 1.1 1.1');
          setTimeout(() => this.el.setAttribute('scale', '1 1 1'), 100);
        });
      }
    });



// 6. HAND INTERACTION (Corrected)
    AFRAME.registerComponent('hand-interaction', {
      init: function() {
        this.grabbedEl = null;
        this.prevHandPos = new THREE.Vector3();
        this.currentHandPos = new THREE.Vector3();
        //this.textureLabels = ["NONE", "SQUARE", "DOTS", "METAL"];

        this.el.addEventListener('triggerdown', () => {
          const ray = this.el.components.raycaster;
          if (!ray || ray.intersectedEls.length === 0) this.onGrab();
        });

        this.el.addEventListener('triggerup', () => this.onRelease());

        // A-Button (Right Hand) and X-Button (Left Hand) Logic
        const spawnHandler = () => {
          const menu = this.el.sceneEl.components['menu-controller'];
          let handPos = new THREE.Vector3();
          this.el.object3D.getWorldPosition(handPos);
         
          if (menu.currentMode === 'add') {
            const config = shapeConfigs[menu.currentShape];
            let newObj = document.createElement('a-entity');
            newObj.classList.add('cube', 'spawned');

            if (config.isModel) {
              newObj.setAttribute('gltf-model', config.model);
              newObj.setAttribute('scale', config.scale);
              // Use your injector component for .glb models
              newObj.setAttribute('model-texture-fix', { src: current_texture });
            } else {
              newObj.setAttribute('geometry', config.geometry);
              newObj.setAttribute('material', {
                src: current_texture,
                color: object_color
              });
            }

            newObj.setAttribute('position', handPos);
            newObj.setAttribute('manual-physics', '');
            this.el.sceneEl.appendChild(newObj);
          } 
          else if (menu.currentMode === 'delete') {
            document.querySelectorAll('.spawned').forEach(obj => {
              let objPos = new THREE.Vector3();
              obj.object3D.getWorldPosition(objPos);
              if (handPos.distanceTo(objPos) < 0.3) obj.parentNode.removeChild(obj);
            });
          }
        };

        this.el.addEventListener('abuttondown', spawnHandler);
        this.el.addEventListener('xbuttondown', spawnHandler);
      },
      tick: function() {
        this.prevHandPos.copy(this.currentHandPos);
        this.el.object3D.getWorldPosition(this.currentHandPos);
      },
      onGrab: function() {
        let cubes = document.querySelectorAll('.cube');
        cubes.forEach(cube => {
          let cubePos = new THREE.Vector3();
          cube.object3D.getWorldPosition(cubePos);
          if (this.currentHandPos.distanceTo(cubePos) < 0.25) {
            this.grabbedEl = cube;
            this.grabbedEl.components['manual-physics'].isGrabbed = true;
            this.el.object3D.attach(this.grabbedEl.object3D);
          }
        });
      },
      onRelease: function() {
        if (this.grabbedEl) {
          let throwVec = new THREE.Vector3().subVectors(this.currentHandPos, this.prevHandPos).multiplyScalar(0.8);
          this.el.sceneEl.object3D.attach(this.grabbedEl.object3D);
          this.grabbedEl.components['manual-physics'].isGrabbed = false;
          this.grabbedEl.components['manual-physics'].velocity.copy(throwVec);
          this.grabbedEl = null;
        }
      }
    });


AFRAME.registerComponent('mode-background', {
  init: function () {
    const sky = this.el;
    const sceneEl = this.el.sceneEl;

    sceneEl.addEventListener('enter-vr', () => {
      if (sceneEl.is('ar-mode')) {
        // In AR, we want the sky to be optinol so we can chose to see the room if needed
        sky.setAttribute('material', {color: 'black', transparent: true});
        sky.setAttribute('visible', true);
      } else {
        // In VR, we want it invisible and black becuse theres no reason to change it yet
        sky.setAttribute('material', {color: 'black', transparent: true});
        sky.setAttribute('visible', false);
      }
    });
  }
});


  </script>
</head>
<body>
  <a-scene menu-controller>
    <a-assets>
      <img id="tile" src="floor_tile.png" />
      <a-asset-item id="custom-model" src="test_hand.glb"></a-asset-item>
    </a-assets>
    

    <a-plane 
        rotation="-90 0 0" 
        width="80" 
        height="80" 
        material="src: #tile; repeat: 160 160; shader: flat; transparent: true"
        force-sharp>
    </a-plane>

    <a-entity id="rig" position="0 0 0">
      <a-camera position="0 1.6 0">

<a-entity >

        <a-entity id="ui-menu" position="0 0 -1.2" visible="false">
          <a-plane width="0.85" height="0.65" color="#111" opacity="0.9"></a-plane>
          
          <a-text value="SHAPE" position="0.018 0.25 0.01" scale="0.18 0.18 0.18" color="cyan"></a-text>
          <a-text value="SKY" position="-0.38 0.25 0.01" scale="0.18 0.18 0.18" color="cyan"></a-text>
          <a-text value="" position="0.018 0.02 0.01" scale="0.18 0.18 0.18" color="cyan"></a-text>
          <a-text value="player speed" position="-0.38 0.02 0.01" scale="0.18 0.18 0.18" color="cyan"></a-text>

<a-plane class="menu-btn" ui-button data-action="cycle-texture" position="0.3 0.05 0.02" width="0.15" height="0.08" color="#333">
  <a-text value="NONE" align="center" scale="0.15 0.15 0.15" position="0 0 0.001"></a-text>
</a-plane>

          <a-plane class="menu-btn" ui-button data-action="toggle-mode" position="0.1 0.15 0.02" width="0.15" height="0.08" color="#333">
          <a-text id="mode-text" value="ADD" align="center" scale="0.15 0.15 0.15" position="0 0 0.001"></a-text>
          </a-plane>

          <a-plane class="menu-btn" ui-button data-action="toggle-sky" position="-0.3 0.15 0.02" width="0.15" height="0.08" color="#333">
          <a-text value="SKY ON" align="center" scale="0.15 0.15 0.15"></a-text>
          </a-plane>

          <a-plane class="menu-btn" ui-button data-action="toggle-run" position="-0.3 -0.05 0.02" width="0.15" height="0.08" color="#333">
          <a-text value="RUN OFF" align="center" scale="0.15 0.15 0.15"></a-text>
          </a-plane>

          <a-plane class="menu-btn" ui-button data-action="cycle-shape" position="0.1 -0.05 0.02" width="0.15" height="0.08" color="#333">
          <a-text value="CUBE" align="center" scale="0.15 0.15 0.15"></a-text>
          </a-plane>

          <a-plane class="menu-btn" ui-button data-action="cycle-color" position="0.1 0.05 0.02" width="0.15" height="0.08" color="#333">
          <a-text value="YELLOW" align="center" scale="0.15 0.15 0.15"></a-text>
          </a-plane>

          <a-plane class="menu-btn" ui-button data-action="clear-req" position="0.2 -0.22 0.02" width="0.35" height="0.08" color="red">
            <a-text value="ERASE ALL SHAPES" align="center" scale="0.15 0.15 0.15" position="0 0 0.001"></a-text>
          </a-plane>

          <a-entity id="confirm-window" visible="false" position="0 0 0.05">
            <a-plane width="0.4" height="0.25" color="#000"></a-plane>
            <a-text value="ARE YOU SHURE?" position="0 0.08 0.01" align="center" scale="0.15 0.15 0.15"></a-text>
            <a-plane class="conf-btn" ui-button data-action="clear-yes" position="-0.1 -0.05 0.02" width="0.12" height="0.08" color="green">
              <a-text value="YES" align="center" scale="0.15 0.15 0.15" position="0 0 0.001"></a-text>
            </a-plane>

            <a-plane class="conf-btn" ui-button data-action="clear-no" position="0.1 -0.05 0.02" width="0.12" height="0.08" color="red">
              <a-text value="NO" align="center" scale="0.15 0.15 0.15" position="0 0 0.001"></a-text>
            </a-plane>
          </a-entity>



<a-entity id="ui-menu2" position="0 0 -1.2" visible="true">
          <a-plane width="0.45" height="0.65" color="#111" opacity="0.9"></a-plane>
          
          <a-text value="SETTINGS" position="-0.18 0.25 0.01" scale="0.18 0.18 0.18" color="cyan"></a-text>
          

</a-entity>

        </a-entity>
      </a-camera>
      
      <a-entity id="lhand" hand-controls="hand: left" 
                vr-move hand-interaction
                cursor="rayOrigin: entity"
                raycaster="objects: .menu-btn; far: 4; interval: 50; showLine: true" 
                line="color: white; opacity: 0.1"></a-entity>
      
      <a-entity id="rhand" hand-controls="hand: right" 
                vr-move hand-interaction
                cursor="rayOrigin: entity"
                raycaster="objects: .menu-btn; far: 4; interval: 50; showLine: true"
                line="color: cyan; opacity: 0.6"></a-entity>
    </a-entity>

    <a-box class="cube" position="0 1 -0.5" width="0.15" height="0.15" depth="0.15" color="#4CC3D9" manual-physics></a-box>
    
    <a-sky id="main-sky" mode-background color="black" visible="true"></a-sky>
  </a-scene>

</body>
</html>
